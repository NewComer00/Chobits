name: Release

# Version bumps and release PRs on main (release-plz).
# Merge the release PR to create a v* tag → Tests → Packaging.
#
# Required: repository secret RELEASE_PLZ_TOKEN (classic PAT with repo + workflow
# scopes, or fine-grained with Contents + Pull requests write). Used so release
# PRs run Tests and tags trigger Tests/Packaging. If you sign git tags, the
# release job also needs persist-credentials so git can push signed tags.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: release-plz / release (tag)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NewComer00'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # Signed tags are pushed via git CLI, not the GitHub API.
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run release-plz release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: release-plz / open release PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NewComer00'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
